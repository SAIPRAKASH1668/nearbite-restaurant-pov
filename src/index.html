<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <!-- Google Fonts - Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Polyfill for sockjs-client -->
  <script>
    window.global = window;
  </script>

  <!--
    Epson ePOS SDK — enables WiFi printing directly from the browser.
    Required for network printers (Epson TM-T82X, TM-T88, TM-T20) when running
    the web version WITHOUT the Android app.

    HOW TO INSTALL:
      1. Go to https://download.epson-biz.com/?service=pos
      2. Search "ePOS SDK for JavaScript" and download the zip
      3. Extract → copy the  epos-X.XX.X.js  file into  src/assets/
      4. Rename it to  epos-sdk.js  (or update the src below)

    The printer's ePOS-Print function must be enabled (it is ON by default
    for all Epson TM-T82X network models). The browser connects to the printer's
    built-in WebSocket server on port 8008 — no raw TCP, no backend proxy needed.
  -->
  <script src="assets/epos-sdk.js" onerror="console.warn('[NearBite] Epson ePOS SDK not found at assets/epos-sdk.js — WiFi printing in browser is disabled. See index.html for setup instructions.')"></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
