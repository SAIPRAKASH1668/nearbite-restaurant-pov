<!-- Tablet backdrop: tap anywhere outside the sidebar to collapse it -->
<div class="sidebar-tablet-backdrop"
     *ngIf="!isCollapsed"
     (click)="toggleSidebar()"></div>

<aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <!-- Logo Section -->
  <div class="sidebar-header">
    <div class="logo" (click)="isCollapsed && toggleSidebar()">
      <svg class="logo-svg" viewBox="0 0 30 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Fork — yellow -->
        <line x1="5" y1="2" x2="5" y2="9"  stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="2" x2="8" y2="9"  stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="2" x2="11" y2="9" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <path d="M5,9 C5,13 11,13 11,9" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="13" x2="8" y2="26" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
        <!-- Knife — red -->
        <path d="M22,2 L19,2 L19,16 C21,16 24,13 24,7 C24,4 23,2 22,2 Z"
              stroke="#E83A3A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="19" y1="16" x2="19" y2="26" stroke="#E83A3A" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand" *ngIf="!isCollapsed">
      <h2 class="brand-name">
        <span class="brand-yum">Yum</span><span class="brand-dude">Dude</span>
      </h2>
      <p class="brand-tagline">Partner Dashboard</p>
    </div>
    <button class="toggle-btn" *ngIf="!isCollapsed" (click)="toggleSidebar()">
      <i class="fas fa-chevron-left"></i>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of navItems" class="nav-item">
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="item.route === '/dashboard' ? {exact: true} : {exact: false}"
          class="nav-link"
          [title]="isCollapsed ? item.label : ''"
        >
          <i class="fas {{ item.icon }} nav-icon"></i>
          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
          <span class="badge" *ngIf="item.badge && !isCollapsed">{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Logout' : ''">
      <i class="fas fa-sign-out-alt nav-icon"></i>
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
