<aside class="sidebar" [class.collapsed]="isCollapsed">
  <!-- Logo Section -->
  <div class="sidebar-header">
    <div class="logo" (click)="isCollapsed && toggleSidebar()"></div>
    <div class="brand" *ngIf="!isCollapsed">
      <h2 class="brand-name">NearBite</h2>
      <p class="brand-tagline">Partner Dashboard</p>
    </div>
    <button class="toggle-btn" *ngIf="!isCollapsed" (click)="toggleSidebar()">
      <i class="fas fa-chevron-left"></i>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of navItems" class="nav-item">
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-link"
          [title]="isCollapsed ? item.label : ''"
        >
          <i class="fas {{ item.icon }} nav-icon"></i>
          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
          <span class="badge" *ngIf="item.badge && !isCollapsed">{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Logout' : ''">
      <i class="fas fa-sign-out-alt nav-icon"></i>
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
