<!-- Premium Ticket-Style Order Notification - Centered -->
<div class="notification-backdrop" *ngIf="showModal" [@fadeIn] (click)="closeModal()"></div>

<div class="ticket-modal" *ngIf="showModal" [@slideInScale] (click)="$event.stopPropagation()">
  
  <!-- Ticket Header Strip -->
  <div class="ticket-header">
    <div class="header-left">
      <div class="pulse-indicator"></div>
      <div class="header-info">
        <span class="ticket-title">NEW ORDER</span>
        <span class="ticket-subtitle">{{ currentOrder?.time || 'Just now' }}</span>
      </div>
    </div>
    <div class="header-right">
      <span class="queue-badge" *ngIf="getPendingOrdersCount() > 1">
        <i class="fas fa-layer-group"></i>
        {{ getPendingOrdersCount() }}
      </span>
      <button class="close-icon" (click)="closeModal()" [disabled]="isProcessing">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- Ticket Body - Main Content -->
  <div class="ticket-body" *ngIf="currentOrder">
    
    <!-- Left Section - Order Info -->
    <div class="ticket-left">
      <div class="order-details">
        <div class="detail-row">
          <span class="detail-label">Order ID</span>
          <span class="detail-value order-number">{{ currentOrder.orderNumber }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Customer</span>
          <span class="detail-value customer">
            <i class="fas fa-user-circle"></i>
            {{ currentOrder.customerName }}
          </span>
        </div>
        <div class="detail-row total-row">
          <span class="detail-label">Total Amount</span>
          <span class="detail-value amount">₹{{ currentOrder.amount }}</span>
        </div>
      </div>
    </div>

    <!-- Divider with perforations -->
    <div class="ticket-divider">
      <div class="perforation top"></div>
      <div class="dashed-line"></div>
      <div class="perforation bottom"></div>
    </div>

    <!-- Right Section - Items List -->
    <div class="ticket-right">
      <div class="items-header">
        <i class="fas fa-receipt"></i>
        <span>Order Items ({{ getTotalItemsCount() }})</span>
      </div>
      <div class="items-scroll">
        <div class="item-row" *ngFor="let item of currentOrder.items">
          <span class="item-name">{{ item.name }}</span>
          <span class="item-qty">×{{ item.quantity }}</span>
        </div>
      </div>
      <button class="view-full-btn" (click)="viewDetails()">
        View Full Details
        <i class="fas fa-arrow-right"></i>
      </button>
    </div>

  </div>

  <!-- Ticket Footer - Actions -->
  <div class="ticket-footer">
    <button 
      class="ticket-action-btn decline-btn" 
      (click)="rejectOrder()"
      [disabled]="isProcessing"
    >
      <i class="fas fa-ban"></i>
      <span>Decline</span>
    </button>
    
    <button 
      class="ticket-action-btn accept-btn" 
      (click)="acceptOrder()"
      [disabled]="isProcessing"
    >
      <i class="fas fa-check-circle"></i>
      <span>{{ isProcessing ? 'Accepting...' : 'Accept Order' }}</span>
    </button>
  </div>

</div>
