version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/yumdude-restaurant/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'no-store'
    # Apple fetches this extensionless file and expects JSON. Amplify would
    # otherwise serve it as octet-stream, which iOS rejects.
    - pattern: '/.well-known/apple-app-site-association'
      headers:
        - key: 'Content-Type'
          value: 'application/json'
  # Rewrites and redirects
  # Rules are evaluated top-to-bottom; first match wins.
  redirects:
    # 1. Proxy all /api/* calls to the actual backend
    - source: /api/<*>
      target: https://api.dev.yumdude.com/api/<*>
      status: '200'
      condition: null

    # 2. Serve the App Link / Universal Link verification files as real files.
    #    Without this, the SPA catch-all below would rewrite them to index.html
    #    and Android/iOS verification would fail.
    - source: /.well-known/<*>
      target: /.well-known/<*>
      status: '200'
      condition: null

    # 3. Standard SPA rewrite - serve index.html for all non-file Angular routes.
    - source: /<*>
      target: /index.html
      status: '200'
      condition: null
